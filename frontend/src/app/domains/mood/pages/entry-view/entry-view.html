<section class="page-shell space-y-6">
  <button type="button" class="quiet-action w-fit" (click)="goBack()">
    Back
  </button>

  @if (errorMessage()) {
    <div class="status-message error">{{ errorMessage() }}</div>
  } @else {
    <app-entry-detail
      [entry]="entry()"
      [skeleton]="isLoading()"
      [showEdit]="!entry()?.deletedAt"
      [showDelete]="!entry()?.deletedAt"
      [showRestore]="!!entry()?.deletedAt"
      (edit)="editEntry()"
      (delete)="deleteEntry()"
      (restore)="restoreEntry()"
    />
  }
</section>
