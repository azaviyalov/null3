<form [formGroup]="form" (ngSubmit)="handleSubmit()" class="form-stack">
  <div class="form-field">
    <label class="field-label" for="feeling">Feeling</label>
    <input
      id="feeling"
      class="field-input"
      formControlName="feeling"
      autocomplete="off"
      [disabled]="disabled()"
      required
    />
    @if (
      form.controls["feeling"].hasError("required") &&
      form.controls["feeling"].touched
    ) {
      <p class="field-error">This field is required.</p>
    }
  </div>

  <div class="form-field">
    <label class="field-label" for="note">Note (optional)</label>
    <textarea
      id="note"
      class="field-textarea"
      formControlName="note"
      rows="6"
      [disabled]="disabled()"
    ></textarea>
  </div>

  <div class="flex flex-wrap items-center justify-end gap-3 pt-2">
    <button
      type="submit"
      class="primary-action"
      [disabled]="form.invalid || disabled()"
    >
      {{ submitLabel() }}
    </button>
  </div>
</form>
