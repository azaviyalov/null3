<section class="page-shell-wide space-y-6">
  <header class="page-intro">
    <h1 class="page-title">Update Diary Entry</h1>
  </header>

  @if (errorMessage()) {
    <div class="status-message error">{{ errorMessage() }}</div>
  } @else if (!isLoading()) {
    <section class="surface-panel">
      <app-diary-entry-form
        [entry]="entry()"
        [disabled]="isSubmitting()"
        submitLabel="Save changes"
        (entrySubmit)="submit($event)"
      />
    </section>
  } @else {
    <section class="surface-panel">
      <div class="space-y-4">
        <div class="skeleton h-10 w-2/3"></div>
        <div class="skeleton h-60 w-full"></div>
      </div>
    </section>
  }
</section>
