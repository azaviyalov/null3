<div class="app-frame">
  <header class="app-header">
    <div class="app-header-inner">
      <div class="brand-block">
        <a routerLink="/" class="brand-link">null3</a>
      </div>

      <div class="nav-stack">
        <nav class="nav-group" aria-label="Primary navigation">
          @if (!user()) {
            <a
              routerLink="/login"
              routerLinkActive="nav-link-active"
              class="nav-link"
            >
              Login
            </a>
          }

          @if (user()) {
            <a
              routerLink="/"
              routerLinkActive="nav-link-active"
              [routerLinkActiveOptions]="{ exact: true }"
              class="nav-link"
            >
              Home
            </a>
            <a
              routerLink="/mood/records"
              routerLinkActive="nav-link-active"
              [routerLinkActiveOptions]="{ exact: true }"
              class="nav-link"
            >
              Mood records
            </a>
            <a
              routerLink="/diary/entries"
              routerLinkActive="nav-link-active"
              [routerLinkActiveOptions]="{ exact: true }"
              class="nav-link"
            >
              Diary Entries
            </a>
          }

          <a
            routerLink="/about"
            routerLinkActive="nav-link-active"
            class="nav-link"
          >
            About
          </a>

          @if (user()) {
            <button type="button" class="nav-link" (click)="logout()">
              Logout
            </button>
          }
        </nav>

        <nav class="nav-group nav-group-muted" aria-label="Admin navigation">
          @if (!adminUser()) {
            <a
              routerLink="/admin/login"
              routerLinkActive="nav-link-active"
              class="nav-link nav-link-muted"
            >
              Admin Login
            </a>
          } @else {
            <a
              routerLink="/admin/invites"
              routerLinkActive="nav-link-active"
              class="nav-link nav-link-muted"
            >
              Admin Area
            </a>
            <button
              type="button"
              class="nav-link nav-link-muted"
              (click)="logoutAdmin()"
            >
              Admin Logout
            </button>
          }
        </nav>
      </div>
    </div>
  </header>

  <main class="app-main">
    <router-outlet />
  </main>
</div>
